```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thiệp Chúc Mừng 8/3</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
text-align:center;
}

.box{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:relative;
max-width:500px;
}

h1{
color:#ff4d6d;
}

/* Ảnh to theo màn hình (Cách 2) */
.main-img{
width:60%;
max-width:420px;
margin:20px auto;
display:none;
border-radius:15px;
}

/* nút */
button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
transition:0.2s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#777;
color:white;
position:absolute;
}

/* tim và hoa rơi */
.heart,.flower{
position:absolute;
animation:fall linear infinite;
}

.heart{color:red;}
.flower{color:pink;}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:1;}
100%{transform:translateY(100vh);opacity:0;}
}

/* lời chúc */
#message{
display:none;
font-size:22px;
color:#ff2e63;
margin-top:20px;
}

/* pháo hoa */
.firework{
position:absolute;
font-size:30px;
animation:boom 1s ease-out forwards;
}

@keyframes boom{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(3);opacity:0;}
}

</style>
</head>

<body>

<div class="box">

<h1>🌸 Thiệp Chúc Mừng 8/3 🌸</h1>

<p>Anh có lời chúc tới em, em có muốn nhận lời chúc đặc biệt không? ❤️</p>

<button id="yes">Đồng ý ❤️</button>
<button id="no">Từ chối 😢</button>

<div id="message"></div>

<img id="loveImg" class="main-img" src="https://pixabay.com/images/download/u_p8cybpzipj-meofamily-10162372_1920.jpg">

</div>

<script>

const yesBtn=document.getElementById("yes")
const noBtn=document.getElementById("no")
const message=document.getElementById("message")
const loveImg=document.getElementById("loveImg")

let yesScale=1
let noScale=1

function moveButton(){

const x=Math.random()*(window.innerWidth-120)
const y=Math.random()*(window.innerHeight-60)

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

}

noBtn.addEventListener("mouseover",moveButton)

noBtn.addEventListener("click",function(){

yesScale+=0.3
noScale-=0.1

if(noScale<0.3){
noScale=0.3
}

yesBtn.style.transform="scale("+yesScale+")"
noBtn.style.transform="scale("+noScale+")"

moveButton()

})

yesBtn.addEventListener("click",function(){

message.style.display="block"
loveImg.style.display="block"

message.innerHTML=
"💐 Chúc Vợ của anh luôn xinh đẹp, hạnh phúc và thật nhiều niềm vui trong cuộc sống và mãi yêu Chồng yêu Con ❤️"

createHearts()
createFlowers()
fireworks()

})

function createHearts(){

for(let i=0;i<40;i++){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(20+Math.random()*30)+"px"
heart.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)

}

}

function createFlowers(){

for(let i=0;i<30;i++){

let flower=document.createElement("div")
flower.className="flower"
flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"vw"
flower.style.fontSize=(20+Math.random()*30)+"px"
flower.style.animationDuration=(3+Math.random()*3)+"s"

document.body.appendChild(flower)

setTimeout(()=>flower.remove(),5000)

}

}

function fireworks(){

for(let i=0;i<20;i++){

let fire=document.createElement("div")
fire.className="firework"
fire.innerHTML="✨"

fire.style.left=Math.random()*100+"vw"
fire.style.top=Math.random()*100+"vh"

document.body.appendChild(fire)

setTimeout(()=>fire.remove(),1000)

}

}

</script>

</body>
</html>
